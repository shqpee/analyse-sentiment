# ============================================================
# cd.yml — C19 : Pipeline de Livraison Continue (CD)
# ============================================================
# Ce workflow s'exécute quand une version est taguée (v1.0.0, v1.1.0...)
# Il construit l'image Docker et la pousse sur Docker Hub.
#
# Compétence : C19 — Mettre en place la livraison continue
# ============================================================

name: CD - Livraison Continue

# Déclencheur : quand on crée un tag de version (ex: git tag v1.0.0)
on:
  push:
    tags:
      - 'v*.*.*'  # Correspond à v1.0.0, v2.1.3, etc.

jobs:
  # ──────────────────────────────────────────
  # JOB : Build + Push Docker Hub
  # ──────────────────────────────────────────
  deploy:
    name: Build et déploiement
    runs-on: ubuntu-latest
    permissions:
      contents: write  # nécessaire pour publier la release GitHub

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      # Activer Buildx (recommandé pour docker/build-push-action)
      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Configurer les credentials Docker Hub
      # (secrets configurés dans GitHub Settings > Secrets)
      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Récupérer le tag de version (ex: v1.0.0)
      - name: Extraire la version
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Build et push de l'image de l'API modèle
      - name: Build et push API Modèle
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.model_api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/avis-sentiment-api-modele:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/avis-sentiment-api-modele:${{ steps.version.outputs.TAG }}

      # Build et push de l'image de l'API données
      - name: Build et push API Données
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.data_api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/avis-sentiment-api-donnees:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/avis-sentiment-api-donnees:${{ steps.version.outputs.TAG }}

      # Créer une release GitHub
      # (softprops/action-gh-release remplace actions/create-release@v1, archivé)
      - name: Créer une release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body: |
            ## Nouveautés
            Images Docker publiées sur Docker Hub.
            - API Modèle IA
            - API Données
          draft: false
          prerelease: false
